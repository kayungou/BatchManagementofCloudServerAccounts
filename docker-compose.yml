name: cloud-account-manager

x-app-environment: &app-environment
  APP_ENV: production
  LISTEN_ADDR: 0.0.0.0:8080
  APP_BASE_URL: ${APP_BASE_URL:-http://127.0.0.1:8080}
  DATABASE_URL: postgres://${POSTGRES_USER:-ikun}:${POSTGRES_PASSWORD:-ServBay.dev}@db:5432/${POSTGRES_DB:-cloud_account_manager}?sslmode=disable
  MASTER_KEY: ${MASTER_KEY:?MASTER_KEY is required; run ./scripts/dev-init.sh --docker}
  COOKIE_NAME: ${COOKIE_NAME:-cloud_manager_session}
  COOKIE_SECURE: ${COOKIE_SECURE:-false}
  SESSION_TTL: ${SESSION_TTL:-168h}
  FRONTEND_DIR: /app/web/dist
  DEV_EXPOSE_TOKENS: "false"
  RUN_WORKER: "false"
  WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-4}
  WORKER_POLL_INTERVAL: ${WORKER_POLL_INTERVAL:-2s}
  SYNC_INTERVAL: ${SYNC_INTERVAL:-5m}

services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ikun}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ServBay.dev}
      POSTGRES_DB: ${POSTGRES_DB:-cloud_account_manager}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      # PostgreSQL 18 uses a major-version-specific PGDATA below this path.
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 30s

  api:
    image: cloud-account-manager:local
    build:
      context: .
    restart: unless-stopped
    init: true
    environment: *app-environment
    ports:
      - "127.0.0.1:${APP_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 20s

  worker:
    image: cloud-account-manager:local
    restart: unless-stopped
    init: true
    command: ["worker"]
    environment: *app-environment
    depends_on:
      api:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    healthcheck:
      disable: true
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 30s

volumes:
  postgres-data:
