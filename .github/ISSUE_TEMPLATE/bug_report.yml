name: Bug 报告
description: 报告可复现的功能、部署或兼容性问题
title: "[Bug]: "
labels: ["type:bug", "status:needs-triage"]
body:
  - type: markdown
    attributes:
      value: 安全漏洞不要提交公开 Issue，请使用仓库 Security 页面中的私有报告入口。日志必须脱敏。
  - type: input
    id: version
    attributes:
      label: 应用版本或提交
      placeholder: v0.1.0 或完整 commit SHA
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: 部署方式
      options:
        - Docker Compose
        - systemd 安装器
        - 本机开发
        - 其他
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: 操作系统、架构、PostgreSQL、Go、Node、浏览器等相关版本。
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. 登录为...
        2. 打开...
        3. 执行...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期结果
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果与脱敏日志
    validations:
      required: true
  - type: textarea
    id: do_api
    attributes:
      label: DigitalOcean API 相关信息
      description: 如适用，提供 HTTP 状态码、request ID 和操作类型，禁止提供 Token。
  - type: checkboxes
    id: checks
    attributes:
      label: 提交前检查
      options:
        - label: 我已搜索现有 Issue，未发现重复报告。
          required: true
        - label: 我已移除 Token、密码、Cookie、MASTER_KEY、数据库 URL 和个人信息。
          required: true
