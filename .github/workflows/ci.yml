name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: cloud_manager_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d cloud_manager_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      TEST_DATABASE_URL: postgres://ci:ci@127.0.0.1:5432/cloud_manager_test?sslmode=disable
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Verify module files
        run: go mod tidy -diff
      - name: Check formatting
        run: |
          files="$(gofmt -l cmd internal)"
          if [[ -n "${files}" ]]; then
            printf 'Go files require gofmt:\n%s\n' "${files}"
            exit 1
          fi
      - name: Vet
        run: go vet ./...
      - name: Test with PostgreSQL 18
        run: go test -race -shuffle=on -count=1 -covermode=atomic -coverprofile=coverage.out ./...
      - name: Build binary
        run: |
          build_time="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          go build -trimpath \
            -ldflags "-X github.com/kayungou/BatchManagementofCloudServerAccounts/internal/buildinfo.Version=ci -X github.com/kayungou/BatchManagementofCloudServerAccounts/internal/buildinfo.Commit=${GITHUB_SHA} -X github.com/kayungou/BatchManagementofCloudServerAccounts/internal/buildinfo.BuildTime=${build_time}" \
            -o /tmp/cloudmanager ./cmd/cloudmanager
          /tmp/cloudmanager version
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: backend-coverage
          path: coverage.out
          if-no-files-found: error

  frontend:
    name: Frontend (Node ${{ matrix.node }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        node: [22.17.0, 24.x]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm --prefix web ci
      - run: npm --prefix web run typecheck
      - run: npm --prefix web run build
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: matrix.node == '24.x'
        with:
          name: web-dist
          path: web/dist
          if-no-files-found: error

  scripts:
    name: Scripts and Compose
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Check shell syntax
        run: bash -n scripts/dev-init.sh scripts/install.sh scripts/deploy-compose.sh scripts/build-release.sh
      - name: ShellCheck
        run: shellcheck scripts/dev-init.sh scripts/install.sh scripts/deploy-compose.sh scripts/build-release.sh
      - name: Validate Compose files
        env:
          MASTER_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: cloud_manager_test
          APP_BASE_URL: https://cloud.example.test
          APP_IMAGE: ghcr.io/example/cloud-account-manager:v0.1.0
        run: |
          docker compose -f docker-compose.yml config --quiet
          docker compose -f deploy/docker-compose.production.yml config --quiet

  container-smoke:
    name: Container smoke test
    runs-on: ubuntu-24.04
    env:
      MASTER_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      POSTGRES_USER: ci
      POSTGRES_PASSWORD: ci
      POSTGRES_DB: cloud_manager_test
      APP_PORT: 8080
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Build image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          load: true
          tags: cloud-account-manager:local
          cache-from: type=gha,scope=container-ci
          cache-to: type=gha,mode=max,scope=container-ci
      - name: Start stack
        run: |
          docker compose up -d --no-build --wait --wait-timeout 180 db api
          docker compose up -d --no-build worker
          docker compose ps --status running --services | grep -qx worker
      - name: Check readiness
        run: curl --fail --silent --show-error http://127.0.0.1:8080/readyz
      - name: Show logs on failure
        if: failure()
        run: docker compose logs --no-color api worker db
      - name: Stop stack
        if: always()
        run: docker compose down -v
