name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  quality:
    uses: ./.github/workflows/ci.yml

  metadata:
    name: Validate release metadata
    needs: quality
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Require an explicit license
        run: |
          if [[ ! -f LICENSE ]]; then
            echo "Add the project owner-approved LICENSE before publishing a release."
            exit 1
          fi

  bundles:
    name: Linux release bundles
    needs: metadata
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build release archives
        env:
          COMMIT: ${{ github.sha }}
        run: |
          export BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          ./scripts/build-release.sh "${GITHUB_REF_NAME}"
      - uses: actions/upload-artifact@v4
        with:
          name: release-bundles
          path: dist/release/*
          if-no-files-found: error
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/release/*
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/release/* --verify-tag --generate-notes --title "${GITHUB_REF_NAME}"

  container:
    name: Publish GHCR image
    needs: metadata
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
      - name: Resolve image metadata
        id: image
        run: |
          echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >>"${GITHUB_OUTPUT}"
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >>"${GITHUB_OUTPUT}"
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_TIME=${{ steps.image.outputs.build_time }}
          cache-from: type=gha,scope=container-release
          cache-to: type=gha,mode=max,scope=container-release
          provenance: mode=max
          sbom: true
      - uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
